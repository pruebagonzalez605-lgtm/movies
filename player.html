<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Player</title>
  <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.8.4/dist/plyr.css">
  <link rel="stylesheet" href="./src/styles/app.css">
</head>

<body data-page="player">
  <header class="site-header">
    <a class="brand" href="./index.html"><img class="brand-mark" src="./assets/logo/colevana-120.png" srcset="./assets/logo/colevana-120.png 1x, ./assets/logo/colevana-240.png 2x" alt="" width="32" height="32">COLEVANA</a>
    <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-controls="site-nav-player"
      aria-expanded="false" data-nav-toggle>
      <span class="nav-toggle-lines">
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
        <span class="nav-toggle-line"></span>
      </span>
    </button>
    <nav class="site-nav" id="site-nav-player" aria-label="Secciones principales">
      <a class="nav-link" href="./movies.html">PELICULAS</a>
      <a class="nav-link" href="./series.html">Series</a>
      <a class="nav-link" href="./sagas.html">Sagas</a>
      <a class="nav-link" href="./sugerencias.html">Sugerencias</a>
      <form class="site-search" action="./search.html" method="get">
        <input class="site-search-input" type="search" name="q" placeholder="Buscar peliculas, series..." aria-label="Buscar en el sitio">
        <button class="site-search-btn" type="submit">Buscar</button>
        <div class="site-search-dropdown"></div>
      </form>
      <div class="kick-corner">
        <button class="kick-login-btn" id="kickLoginBtn">Ingresar con Kick</button>
        <div class="kick-user-badge" id="kickUserBadge">
          <div class="kick-user-avatar" id="kickUserAvatar"></div>
          <span class="kick-user-name" id="kickUserName"></span>
          <button class="kick-logout-btn" id="kickLogoutBtn">Salir</button>
        </div>
      </div>
    </nav>
  </header>
  <div class="kick-gate-error" id="kickGateError">No se pudo iniciar sesion con Kick. Proba de nuevo.</div>

  <main class="player-page">
    <a class="player-back-link" id="playerBackLink" href="./movies.html">Volver al catalogo</a>

    <section class="theater">
      <div class="screen-frame">
        <div class="sprocket-row">
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
        </div>
        <video id="player" controls preload="metadata" playsinline webkit-playsinline></video>
        <div class="sprocket-row bottom">
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
          <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
        </div>

        <!-- Botón flotante para abrir episodios -->
        <button id="toggleEpisodeBtn" class="episode-toggle-btn" type="button" title="Ver todos los episodios">
          <span class="episode-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          </span>
          Episodios
        </button>

        <!-- ==================== PANEL DE EPISODIOS (esquina del reproductor) ==================== -->
        <div class="episode-grid-container" id="episodeGridContainer">
          <div class="episode-grid-header">
            <h3 class="sr-only" id="gridSeriesTitle">Serie</h3>
            <div class="season-select-wrap">
              <select id="seasonSelect" class="season-select" aria-label="Seleccionar temporada"></select>
            </div>
            <button id="closeGridBtn" class="grid-close-btn" type="button" aria-label="Cerrar lista de episodios">✕</button>
          </div>
          <div class="episode-grid" id="episodeGrid"></div>
        </div>
      </div>

      <div class="player-quick-settings" id="playerQuickSettings" hidden>
        <label class="player-quality-control" for="playerQualitySelect">
          <span>Calidad</span>
          <select id="playerQualitySelect" aria-label="Calidad del video">
            <option value="auto">Automatica</option>
          </select>
        </label>
        <span class="player-quality-hint" id="playerQualityHint"></span>
      </div>
      <div class="status" id="playerStatus"></div>

      <div class="rating-panel" id="ratingPanel">
        <div class="rating-global">
          <div class="stars" id="globalStars"></div>
          <span class="rating-global-text" id="ratingGlobalText">Sin calificaciones aun</span>
        </div>
        <div class="rating-user" id="ratingUserBlock" style="display:none;">
          <span class="rating-user-label">Tu calificacion:</span>
          <div class="stars" id="userStars"></div>
        </div>
        <span class="rating-login-hint" id="ratingLoginHint">Inicia sesion con Kick para calificar</span>
      </div>
    </section>

    <section class="catalog-section">
      <div class="carousel-label" id="playerCollectionTitle">Seguir explorando</div>
      <div class="player-story-grid" id="playerRelated"></div>
    </section>
  </main>

  <div class="resume-overlay" id="resumeOverlay" role="dialog" aria-modal="true" aria-labelledby="resumeModalTitle">
    <div class="resume-modal">
      <div class="eyebrow">Continuar viendo</div>
      <h2 id="resumeModalTitle">Progreso guardado</h2>
      <div class="resume-time">Quedaste en <span id="resumeModalTime">0:00</span></div>
      <div class="resume-actions">
        <button class="resume-btn primary" id="resumeContinueBtn" type="button">Continuar</button>
        <button class="resume-btn" id="resumeRestartBtn" type="button">Empezar de nuevo</button>
      </div>
      <button class="resume-dismiss" id="resumeCloseBtn" type="button">Cerrar</button>
    </div>
  </div>

  <script type="module" src="./src/scripts/nav.js"></script>
  <script type="module" src="./src/scripts/search-ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.8.4/dist/plyr.polyfilled.min.js"></script>
  <script type="module" src="./src/scripts/player-page.js"></script>
</body>

</html>
