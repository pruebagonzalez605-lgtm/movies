<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartelera</title>
<style>
  :root{
    --bg: #0b0b0f;
    --panel: #141419;
    --film: #1c1c22;
    --accent: #e8c468;
    --accent-dim: #8a6f2f;
    --text: #eae6da;
    --text-dim: #8b8a86;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(ellipse at center, #16161c 0%, var(--bg) 70%);
    font-family: 'Courier New', ui-monospace, monospace;
    color: var(--text);
  }
  .theater{
    width: min(920px, 94vw);
    margin: 0 auto;
    padding: 28px 28px 40px;
  }

  .marquee{
    text-align:center;
    margin-bottom: 18px;
  }
  .marquee .eyebrow{
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--accent-dim);
    text-transform: uppercase;
  }
  .marquee h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: clamp(20px, 3.6vw, 30px);
    margin: 6px 0 0;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .screen-frame{
    position:relative;
    background: var(--film);
    border-radius: 6px;
    padding: 10px;
    box-shadow:
      0 0 0 1px #2a2a32,
      0 30px 60px -20px rgba(0,0,0,0.8);
  }
  .sprocket-row{
    display:flex; justify-content:space-between;
    padding: 0 4px 8px;
  }
  .sprocket-row.bottom{ padding: 8px 4px 0; }
  .sprocket{
    width: 10px; height: 10px;
    background: var(--bg);
    border-radius: 2px;
  }

  video{
    display:block;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 2px;
  }

  .carousel-label{
    display:flex;
    align-items:center;
    gap: 10px;
    margin: 28px 0 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .carousel-label::before, .carousel-label::after{
    content:'';
    flex:1;
    height:1px;
    background: #2a2a32;
  }

  .carousel{
    display:flex;
    gap: 14px;
    overflow-x: auto;
    padding: 6px 4px 16px;
    scroll-snap-type: x proximity;
  }
  .carousel::-webkit-scrollbar{ height: 6px; }
  .carousel::-webkit-scrollbar-thumb{ background: #2a2a32; border-radius: 3px; }

  .poster{
    scroll-snap-align: start;
    flex: 0 0 148px;
    height: 210px;
    border-radius: 6px;
    border: 1px solid #2a2a32;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding: 12px 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .poster:hover{
    transform: translateY(-4px);
    box-shadow: 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster.active{
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster .code{
    position:absolute;
    top: 10px; left: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.55);
  }
  .poster .now-playing{
    position:absolute;
    top: 10px; right: 10px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    display: none;
  }
  .poster.active .now-playing{ display:block; }
  .poster.texture-slasher::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 78% 18%, rgba(200,20,20,0.55) 0 10px, transparent 11px),
      radial-gradient(circle at 65% 30%, rgba(200,20,20,0.4) 0 6px, transparent 7px),
      radial-gradient(circle at 85% 40%, rgba(200,20,20,0.35) 0 5px, transparent 6px),
      linear-gradient(20deg, transparent 46%, rgba(200,20,20,0.5) 48%, transparent 50%),
      linear-gradient(20deg, transparent 56%, rgba(200,20,20,0.4) 58%, transparent 60%),
      linear-gradient(20deg, transparent 66%, rgba(200,20,20,0.3) 68%, transparent 70%);
    mix-blend-mode: screen;
    pointer-events:none;
  }
  .poster h3{
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.15;
    color: #f4f1ea;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .poster p{
    margin: 4px 0 0;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  .status{
    text-align:center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="theater">
  <div class="marquee">
    <div class="eyebrow">Ahora proyectando</div>
    <h1 id="titleDisplay">Elegí una película</h1>
  </div>

  <div class="screen-frame">
    <div class="sprocket-row">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>

    <video id="player" controls preload="metadata">
      Tu navegador no soporta la reproducción de video.
    </video>

    <div class="sprocket-row bottom">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>
  </div>

  <div class="carousel-label">Cartelera</div>
  <div class="carousel" id="carousel"></div>

  <div class="status" id="status"></div>
</div>

<script>
  // ------------------------------------------------------------------
  // Para agregar una película nueva, sumá un objeto acá con:
  //   code    -> número o etiqueta corta que aparece arriba a la izquierda
  //   title   -> título mostrado en la tarjeta y en el encabezado
  //   gradient-> degradado de fondo de la tarjeta (2 colores hex)
  //   texture -> (opcional) 'slasher' aplica la textura de salpicaduras en CSS
  //   src     -> URL directa del archivo de video (release de GitHub, etc.)
  // ------------------------------------------------------------------
  const MOVIES = [
    {
      code: '01',
      title: 'Toy Story 5',
      gradient: ['#0d1b3d', '#1e3a6d'],
      poster: 'https://m.media-amazon.com/images/M/MV5BOTNiNWExOTQtZTU1Ny00N2MyLWI4YzMtMWJjMTI1ZWRmNmQ4XkEyXkFqcGc@._V1_FMjpg_UX1080_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.0/TS5.mp4'
    },
    {
      code: '02',
      title: 'Scary Movie 6',
      gradient: ['#1a0507', '#5c1013'],
      texture: 'slasher',
      poster: 'https://m.media-amazon.com/images/M/MV5BNTJjMDk1NzAtMGVmNS00NTFmLWFlOTQtZDk5M2I2NjZiZDdlXkEyXkFqcGc@._V1_FMjpg_UX878_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.1/SC6.mp4'
    },
    {
      code: '03',
      title: 'Michael Jackson',
      gradient: ['#1a1408', '#5c4a13'],
      poster: 'https://m.media-amazon.com/images/M/MV5BNzllNmRlN2EtMDQyOC00ODJjLTg4OWQtZDNmNGU3YzlkNjc1XkEyXkFqcGc@._V1_FMjpg_UY3000_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.2/MJU.mp4'
    },
    {
      code: '04',
      title: 'Obsession',
      gradient: ['#1a0d1f', '#4a1e52'],
      poster: 'https://m.media-amazon.com/images/M/MV5BMmQ3ODQxNjAtZmRlMS00NmNjLTliZmYtY2M3ZWQzMDIwMmNiXkEyXkFqcGc@.V1_FMjpg_UX1050.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.3/Obson.mp4'
    },
    {
      code: '05',
      title: 'Los Simpson: Simpsley',
      gradient: ['#1a1400', '#5c4a00'],
      poster: 'https://m.media-amazon.com/images/M/MV5BODc2MmEyZTItNGY0MS00YTVhLTg2ZDEtNGJhMDc4YjE3ZmVkXkEyXkFqcGc@._V1_FMjpg_UX1080_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.4/Simpsley.mp4'
    },
    {
      code: '06',
      title: 'Pretty Woman',
      gradient: ['#3d0d1a', '#8a1e4a'],
      poster: 'https://m.media-amazon.com/images/M/MV5BYzZiZjAxODItYzJhNi00ZjgyLThlMWEtMWI4NjM3YjNlN2M4XkEyXkFqcGc@._V1_FMjpg_UX1066_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.5/PW.mp4'
    }
  ];

  const player = document.getElementById('player');
  const carousel = document.getElementById('carousel');
  const titleDisplay = document.getElementById('titleDisplay');
  const status = document.getElementById('status');

  function renderCarousel(){
    carousel.innerHTML = '';
    MOVIES.forEach((movie, i) => {
      const card = document.createElement('div');
      card.className = 'poster' + (movie.texture ? ' texture-' + movie.texture : '');
      const setGradient = () => {
        card.style.backgroundImage = 'none';
        card.style.background = `linear-gradient(160deg, ${movie.gradient[0]}, ${movie.gradient[1]})`;
      };
      if(movie.poster){
        card.style.backgroundSize = 'cover';
        card.style.backgroundPosition = 'center';
        card.style.backgroundColor = movie.gradient[1];
        const testImg = new Image();
        testImg.onload = () => {
          card.style.backgroundImage =
            `linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.9) 100%), url('${movie.poster}')`;
        };
        testImg.onerror = setGradient;
        testImg.src = movie.poster;
      } else {
        setGradient();
      }
      card.innerHTML = `
        <span class="code">${movie.code}</span>
        <span class="now-playing">Reproduciendo</span>
        <h3>${movie.title}</h3>
      `;
      card.addEventListener('click', () => selectMovie(i));
      carousel.appendChild(card);
    });
  }

  function selectMovie(index){
    const movie = MOVIES[index];
    if(!movie) return;
    player.src = movie.src;
    player.load();
    titleDisplay.textContent = movie.title;
    status.textContent = 'Cargando: ' + movie.title;
    [...carousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    player.play().catch(() => {});
  }

  player.addEventListener('error', () => {
    status.textContent = 'No se pudo cargar el video. Revisá que el release de GitHub siga disponible.';
  });
  player.addEventListener('playing', () => {
    status.textContent = '';
  });

  renderCarousel();
  selectMovie(0);
</script>

</body>
</html>
