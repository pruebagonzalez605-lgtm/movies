<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartelera</title>
<style>
  :root{
    --bg: #0b0b0f;
    --panel: #141419;
    --film: #1c1c22;
    --accent: #e8c468;
    --accent-dim: #8a6f2f;
    --text: #eae6da;
    --text-dim: #8b8a86;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(ellipse at center, #16161c 0%, var(--bg) 70%);
    font-family: 'Courier New', ui-monospace, monospace;
    color: var(--text);
  }
  .theater{
    width: min(920px, 94vw);
    margin: 0 auto;
    padding: 28px 28px 40px;
  }

  .marquee{
    text-align:center;
    margin-bottom: 18px;
  }
  .marquee .eyebrow{
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--accent-dim);
    text-transform: uppercase;
  }
  .marquee h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: clamp(20px, 3.6vw, 30px);
    margin: 6px 0 0;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .screen-frame{
    position:relative;
    background: var(--film);
    border-radius: 6px;
    padding: 10px;
    box-shadow:
      0 0 0 1px #2a2a32,
      0 30px 60px -20px rgba(0,0,0,0.8);
  }
  .sprocket-row{
    display:flex; justify-content:space-between;
    padding: 0 4px 8px;
  }
  .sprocket-row.bottom{ padding: 8px 4px 0; }
  .sprocket{
    width: 10px; height: 10px;
    background: var(--bg);
    border-radius: 2px;
  }

  video{
    display:block;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 2px;
  }

  .carousel-label{
    display:flex;
    align-items:center;
    gap: 10px;
    margin: 28px 0 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .carousel-label::before, .carousel-label::after{
    content:'';
    flex:1;
    height:1px;
    background: #2a2a32;
  }

  .carousel{
    display:flex;
    gap: 14px;
    overflow-x: auto;
    padding: 6px 4px 16px;
    scroll-snap-type: x proximity;
  }
  .carousel::-webkit-scrollbar{ height: 6px; }
  .carousel::-webkit-scrollbar-thumb{ background: #2a2a32; border-radius: 3px; }

  .poster{
    scroll-snap-align: start;
    flex: 0 0 148px;
    height: 210px;
    border-radius: 6px;
    border: 1px solid #2a2a32;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding: 12px 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .poster:hover{
    transform: translateY(-4px);
    box-shadow: 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster.active{
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster .code{
    position:absolute;
    top: 10px; left: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.55);
  }
  .poster .now-playing{
    position:absolute;
    top: 10px; right: 10px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    display: none;
  }
  .poster.active .now-playing{ display:block; }
  .poster.texture-slasher::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 78% 18%, rgba(200,20,20,0.55) 0 10px, transparent 11px),
      radial-gradient(circle at 65% 30%, rgba(200,20,20,0.4) 0 6px, transparent 7px),
      radial-gradient(circle at 85% 40%, rgba(200,20,20,0.35) 0 5px, transparent 6px),
      linear-gradient(20deg, transparent 46%, rgba(200,20,20,0.5) 48%, transparent 50%),
      linear-gradient(20deg, transparent 56%, rgba(200,20,20,0.4) 58%, transparent 60%),
      linear-gradient(20deg, transparent 66%, rgba(200,20,20,0.3) 68%, transparent 70%);
    mix-blend-mode: screen;
    pointer-events:none;
  }
  .poster .saga-tag{
    position:absolute;
    top: 30px; left: 10px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .poster h3{
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.15;
    color: #f4f1ea;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .poster p{
    margin: 4px 0 0;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  .status{
    text-align:center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 16px;
  }

  .tabs{
    display:flex;
    justify-content:center;
    gap: 6px;
    margin: 26px 0 22px;
  }
  .tab{
    background: transparent;
    border: 1px solid #2a2a32;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .tab:hover{
    color: var(--text);
    border-color: #3a3a44;
  }
  .tab.active{
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }

  .season-selector{
    display:flex;
    justify-content:center;
    gap: 8px;
    margin: 4px 0 4px;
    flex-wrap: wrap;
  }
  .season-pill{
    background: var(--panel);
    border: 1px solid #2a2a32;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .season-pill:hover{
    color: var(--text);
    border-color: #3a3a44;
  }
  .season-pill.active{
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="theater">
  <div class="marquee">
    <div class="eyebrow">Ahora proyectando</div>
    <h1 id="titleDisplay">Elegí una película</h1>
  </div>

  <div class="screen-frame">
    <div class="sprocket-row">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>

    <video id="player" controls preload="metadata" playsinline webkit-playsinline>
      <source id="playerSource" src="" type="video/mp4">
    </video>

    <div class="sprocket-row bottom">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="movies">Películas</button>
    <button class="tab" data-tab="series">Series</button>
    <button class="tab" data-tab="sagas">Sagas</button>
  </div>

  <div id="moviesSection">
    <div class="carousel-label">Cartelera</div>
    <div class="carousel" id="carousel"></div>
  </div>

  <div id="seriesSection" style="display:none">
    <div class="carousel-label">Series</div>
    <div class="carousel" id="seriesCarousel"></div>

    <div class="season-selector" id="seasonSelector" style="display:none"></div>
    <div class="carousel" id="episodeCarousel" style="display:none"></div>
  </div>

  <div id="sagasSection" style="display:none">
    <div class="carousel-label">Sagas</div>
    <div class="carousel" id="sagaCarousel"></div>

    <div class="carousel-label" id="sagaMoviesLabel" style="display:none">Películas de la saga</div>
    <div class="carousel" id="sagaMoviesCarousel" style="display:none"></div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>

      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.14/TRMSHOW.mp4'

  // ------------------------------------------------------------------
  // Para agregar una SERIE nueva, sumá un objeto acá con:
  //   title    -> nombre de la serie (se muestra en su portada)
  //   gradient -> degradado de respaldo si la portada no carga
  //   poster   -> portada de la serie (se muestra en el carrusel de series)
  //   seasons  -> array de temporadas: { season: 1, episodes: [ {...} ] }
  //     cada episodio necesita: code, title, poster (opcional), src
  // ------------------------------------------------------------------
  const SERIES = [
    // Ejemplo:
    // {
    //   title: 'Nombre de la serie',
    //   gradient: ['#101020', '#303060'],
    //   poster: 'https://.../portada-serie.jpg',
    //   seasons: [
    //     {
    //       season: 1,
    //       episodes: [
    //         { code: 'T1E1', title: 'Episodio 1', poster: 'https://.../ep1.jpg', src: 'https://.../ep1.mp4' },
    //         { code: 'T1E2', title: 'Episodio 2', poster: 'https://.../ep2.jpg', src: 'https://.../ep2.mp4' }
    //       ]
    //     }
    //   ]
    // }
  ];

  const player = document.getElementById('player');
  const playerSource = document.getElementById('playerSource');
  const carousel = document.getElementById('carousel');
  const seriesCarousel = document.getElementById('seriesCarousel');
  const seasonSelector = document.getElementById('seasonSelector');
  const episodeCarousel = document.getElementById('episodeCarousel');
  const sagaCarousel = document.getElementById('sagaCarousel');
  const sagaMoviesLabel = document.getElementById('sagaMoviesLabel');
  const sagaMoviesCarousel = document.getElementById('sagaMoviesCarousel');
  const titleDisplay = document.getElementById('titleDisplay');
  const status = document.getElementById('status');
  const moviesSection = document.getElementById('moviesSection');
  const seriesSection = document.getElementById('seriesSection');
  const sagasSection = document.getElementById('sagasSection');
  const tabs = document.getElementById('tabs');

  let currentSeriesIndex = null;
  let currentSeasonIndex = 0;

  // Crea una tarjeta de "poster" genérica reutilizable para películas, series y episodios
  function createPosterCard(item, opts = {}){
    const card = document.createElement('div');
    card.className = 'poster' + (item.texture ? ' texture-' + item.texture : '');
    const gradient = item.gradient || ['#1c1c22', '#141419'];
    const setGradient = () => {
      card.style.backgroundImage = 'none';
      card.style.background = `linear-gradient(160deg, ${gradient[0]}, ${gradient[1]})`;
    };
    if(item.poster){
      card.style.backgroundSize = 'cover';
      card.style.backgroundPosition = 'center';
      card.style.backgroundColor = gradient[1];
      const testImg = new Image();
      testImg.onload = () => {
        card.style.backgroundImage =
          `linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.9) 100%), url('${item.poster}')`;
      };
      testImg.onerror = setGradient;
      testImg.src = item.poster;
    } else {
      setGradient();
    }
    card.innerHTML = `
      <span class="code">${item.code || ''}</span>
      <span class="now-playing">Reproduciendo</span>
      ${item.saga ? `<span class="saga-tag">Saga: ${item.saga}</span>` : ''}
      <h3>${item.title}</h3>
    `;
    return card;
  }

  let movieOrder = MOVIES.map((_, i) => i);

  function renderCarousel(){
    carousel.innerHTML = '';
    movieOrder.forEach((movieIdx) => {
      const movie = MOVIES[movieIdx];
      const card = createPosterCard(movie);
      card.addEventListener('click', () => selectMovie(movieIdx));
      carousel.appendChild(card);
    });
  }

  function selectMovie(movieIdx){
    const movie = MOVIES[movieIdx];
    if(!movie) return;
    playerSource.src = movie.src;
    player.load();
    titleDisplay.textContent = movie.title;
    status.textContent = 'Cargando: ' + movie.title;

    if(movie.saga){
      const sameSaga = MOVIES.map((m, i) => i).filter(i => MOVIES[i].saga === movie.saga && i !== movieIdx);
      const rest = MOVIES.map((m, i) => i).filter(i => MOVIES[i].saga !== movie.saga && i !== movieIdx);
      movieOrder = [movieIdx, ...sameSaga, ...rest];
      renderCarousel();
    }

    const displayIdx = movieOrder.indexOf(movieIdx);
    [...carousel.children].forEach((el, i) => el.classList.toggle('active', i === displayIdx));
    player.play().catch(() => {});
  }

  function renderSeriesCarousel(){
    seriesCarousel.innerHTML = '';
    SERIES.forEach((serie, i) => {
      const card = createPosterCard(serie);
      card.addEventListener('click', () => selectSeries(i));
      seriesCarousel.appendChild(card);
    });
  }

  function selectSeries(index){
    const serie = SERIES[index];
    if(!serie) return;
    currentSeriesIndex = index;
    currentSeasonIndex = 0;
    [...seriesCarousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    renderSeasonSelector();
    renderEpisodeCarousel();
  }

  function renderSeasonSelector(){
    const serie = SERIES[currentSeriesIndex];
    if(!serie){ seasonSelector.style.display = 'none'; return; }
    seasonSelector.innerHTML = '';
    seasonSelector.style.display = serie.seasons.length > 1 ? 'flex' : 'none';
    serie.seasons.forEach((s, i) => {
      const pill = document.createElement('button');
      pill.className = 'season-pill' + (i === currentSeasonIndex ? ' active' : '');
      pill.textContent = 'Temporada ' + s.season;
      pill.addEventListener('click', () => {
        currentSeasonIndex = i;
        renderSeasonSelector();
        renderEpisodeCarousel();
      });
      seasonSelector.appendChild(pill);
    });
  }

  function renderEpisodeCarousel(){
    const serie = SERIES[currentSeriesIndex];
    if(!serie){ episodeCarousel.style.display = 'none'; return; }
    const season = serie.seasons[currentSeasonIndex];
    episodeCarousel.innerHTML = '';
    episodeCarousel.style.display = 'flex';
    season.episodes.forEach((ep, i) => {
      const card = createPosterCard(ep);
      card.addEventListener('click', () => selectEpisode(i));
      episodeCarousel.appendChild(card);
    });
  }

  function selectEpisode(index){
    const serie = SERIES[currentSeriesIndex];
    const season = serie.seasons[currentSeasonIndex];
    const ep = season.episodes[index];
    if(!ep) return;
    playerSource.src = ep.src;
    player.load();
    titleDisplay.textContent = serie.title + ' — ' + ep.title;
    status.textContent = 'Cargando: ' + ep.title;
    [...episodeCarousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    player.play().catch(() => {});
  }

  function getSagas(){
    const map = new Map();
    MOVIES.forEach((movie, i) => {
      if(!movie.saga) return;
      if(!map.has(movie.saga)) map.set(movie.saga, []);
      map.get(movie.saga).push(i);
    });
    return [...map.entries()].map(([name, indices]) => ({
      name,
      poster: MOVIES[indices[0]].poster,
      gradient: MOVIES[indices[0]].gradient,
      movieIndices: indices
    }));
  }

  function renderSagaCarousel(){
    const sagas = getSagas();
    sagaCarousel.innerHTML = '';
    sagas.forEach((saga, i) => {
      const card = createPosterCard({ title: saga.name, poster: saga.poster, gradient: saga.gradient });
      card.addEventListener('click', () => selectSaga(i));
      sagaCarousel.appendChild(card);
    });
  }

  function selectSaga(index){
    const sagas = getSagas();
    const saga = sagas[index];
    if(!saga) return;
    [...sagaCarousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    sagaMoviesLabel.style.display = 'block';
    sagaMoviesCarousel.style.display = 'flex';
    sagaMoviesCarousel.innerHTML = '';
    saga.movieIndices.forEach((movieIdx) => {
      const movie = MOVIES[movieIdx];
      const card = createPosterCard(movie);
      card.addEventListener('click', () => {
        switchTab('movies');
        selectMovie(movieIdx);
      });
      sagaMoviesCarousel.appendChild(card);
    });
  }

  function switchTab(tabName){
    [...tabs.children].forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
    moviesSection.style.display = tabName === 'movies' ? 'block' : 'none';
    seriesSection.style.display = tabName === 'series' ? 'block' : 'none';
    sagasSection.style.display = tabName === 'sagas' ? 'block' : 'none';
  }

  tabs.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if(!btn) return;
    switchTab(btn.dataset.tab);
  });

  player.addEventListener('error', () => {
    status.textContent = 'No se pudo cargar el video. Revisá que el release de GitHub siga disponible.';
  });
  player.addEventListener('playing', () => {
    status.textContent = '';
  });

  renderCarousel();
  renderSeriesCarousel();
  renderSagaCarousel();
  selectMovie(0);
</script>

</body>
</html>
