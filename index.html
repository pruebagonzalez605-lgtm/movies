<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cartelera</title>
<style>
  :root{
    --bg: #0b0b0f;
    --panel: #141419;
    --film: #1c1c22;
    --accent: #e8c468;
    --accent-dim: #8a6f2f;
    --text: #eae6da;
    --text-dim: #8b8a86;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(ellipse at center, #16161c 0%, var(--bg) 70%);
    font-family: 'Courier New', ui-monospace, monospace;
    color: var(--text);
  }
  .theater{
    width: min(1400px, 92vw);
    margin: 0 auto;
    padding: 28px 28px 40px;
  }

  .marquee{
    text-align:center;
    margin-bottom: 18px;
  }
  .marquee .eyebrow{
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--accent-dim);
    text-transform: uppercase;
  }
  .marquee h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: clamp(20px, 3.6vw, 30px);
    margin: 6px 0 0;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .screen-frame{
    position:relative;
    background: var(--film);
    border-radius: 6px;
    padding: 10px;
    box-shadow:
      0 0 0 1px #2a2a32,
      0 30px 60px -20px rgba(0,0,0,0.8);
  }
  .sprocket-row{
    display:flex; justify-content:space-between;
    padding: 0 4px 8px;
  }
  .sprocket-row.bottom{ padding: 8px 4px 0; }
  .sprocket{
    width: 10px; height: 10px;
    background: var(--bg);
    border-radius: 2px;
  }

  video{
    display:block;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 2px;
  }

  .carousel-label{
    display:flex;
    align-items:center;
    gap: 10px;
    margin: 28px 0 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .carousel-label::before, .carousel-label::after{
    content:'';
    flex:1;
    height:1px;
    background: #2a2a32;
  }

  .carousel{
    display:flex;
    gap: 14px;
    overflow-x: auto;
    padding: 6px 4px 16px;
    scroll-snap-type: x proximity;
  }
  .carousel::-webkit-scrollbar{ height: 6px; }
  .carousel::-webkit-scrollbar-thumb{ background: #2a2a32; border-radius: 3px; }

  .poster{
    scroll-snap-align: start;
    flex: 0 0 172px;
    height: 244px;
    border-radius: 6px;
    border: 1px solid #2a2a32;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding: 12px 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .poster:hover{
    transform: translateY(-4px);
    box-shadow: 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster.active{
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 14px 26px -10px rgba(0,0,0,0.7);
  }
  .poster .code{
    position:absolute;
    top: 10px; left: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.55);
  }
  .poster .now-playing{
    position:absolute;
    top: 10px; right: 10px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    display: none;
  }
  .poster.active .now-playing{ display:block; }
  .poster.texture-slasher::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 78% 18%, rgba(200,20,20,0.55) 0 10px, transparent 11px),
      radial-gradient(circle at 65% 30%, rgba(200,20,20,0.4) 0 6px, transparent 7px),
      radial-gradient(circle at 85% 40%, rgba(200,20,20,0.35) 0 5px, transparent 6px),
      linear-gradient(20deg, transparent 46%, rgba(200,20,20,0.5) 48%, transparent 50%),
      linear-gradient(20deg, transparent 56%, rgba(200,20,20,0.4) 58%, transparent 60%),
      linear-gradient(20deg, transparent 66%, rgba(200,20,20,0.3) 68%, transparent 70%);
    mix-blend-mode: screen;
    pointer-events:none;
  }
  .poster .saga-tag{
    position:absolute;
    top: 30px; left: 10px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .poster h3{
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.15;
    color: #f4f1ea;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .poster p{
    margin: 4px 0 0;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  .episode-card{
    scroll-snap-align: start;
    flex: 0 0 268px;
    display:flex;
    flex-direction:column;
    cursor:pointer;
  }
  .episode-thumb{
    position:relative;
    width:100%;
    aspect-ratio: 16/9;
    border-radius: 6px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    background-color: var(--film);
    border: 1px solid #2a2a32;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .episode-card:hover .episode-thumb{
    transform: translateY(-2px);
  }
  .episode-card.active .episode-thumb{
    box-shadow: 0 0 0 2px var(--accent);
  }
  .episode-thumb .ep-code{
    position:absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.6);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .episode-thumb .ep-playing{
    display:none;
    position:absolute;
    inset:0;
    align-items:center;
    justify-content:center;
    background: rgba(0,0,0,0.45);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .episode-card.active .ep-playing{ display:flex; }
  .episode-title{
    margin: 8px 0 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    font-weight: 700;
    color: #f4f1ea;
    line-height: 1.3;
  }
  .episode-desc{
    margin: 4px 0 0;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .status{
    text-align:center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 16px;
  }

  .resume-overlay{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(5,5,8,0.78);
    backdrop-filter: blur(3px);
    align-items:center;
    justify-content:center;
    z-index: 1000;
    padding: 20px;
  }
  .resume-modal{
    width: min(380px, 100%);
    background: var(--panel);
    border: 1px solid #2a2a32;
    border-radius: 10px;
    padding: 26px 24px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8);
    text-align:center;
  }
  .resume-modal .eyebrow{
    letter-spacing: 0.3em;
    font-size: 10px;
    color: var(--accent-dim);
    text-transform: uppercase;
  }
  .resume-modal h2{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px;
    color: var(--accent);
    margin: 8px 0 4px;
  }
  .resume-modal .resume-time{
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .resume-modal .resume-time span{
    color: var(--text);
    font-weight: bold;
  }
  .resume-actions{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .resume-btn{
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 8px;
    cursor:pointer;
    border: 1px solid #2a2a32;
    background: transparent;
    color: var(--text);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .resume-btn.primary{
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: bold;
  }
  .resume-btn:hover{
    border-color: var(--accent-dim);
  }
  .resume-dismiss{
    margin-top: 14px;
    background:none;
    border:none;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor:pointer;
    text-decoration: underline;
  }

  .tabs{
    display:flex;
    justify-content:center;
    gap: 6px;
    margin: 26px 0 22px;
  }
  .tab{
    background: transparent;
    border: 1px solid #2a2a32;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .tab:hover{
    color: var(--text);
    border-color: #3a3a44;
  }
  .tab.active{
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }

  .season-selector{
    display:flex;
    justify-content:center;
    gap: 8px;
    margin: 4px 0 4px;
    flex-wrap: wrap;
  }
  .season-pill{
    background: var(--panel);
    border: 1px solid #2a2a32;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .season-pill:hover{
    color: var(--text);
    border-color: #3a3a44;
  }
  .season-pill.active{
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ---------------------------------------------------------
     Ajustes para pantallas de celular (hasta 600px de ancho)
  --------------------------------------------------------- */
  @media (max-width: 600px){
    .theater{
      width: 100%;
      padding: 16px 12px 32px;
    }

    .marquee{ margin-bottom: 14px; }
    .marquee .eyebrow{ font-size: 9px; letter-spacing: 0.28em; }
    .marquee h1{ font-size: clamp(17px, 5vw, 22px); }

    .screen-frame{ padding: 6px; border-radius: 8px; }
    .sprocket{ width: 6px; height: 6px; }
    .sprocket-row{ padding: 0 2px 6px; }
    .sprocket-row.bottom{ padding: 6px 2px 0; }

    .carousel-label{
      margin: 22px 0 10px;
      font-size: 10px;
      letter-spacing: 0.22em;
    }

    .carousel{
      gap: 10px;
      padding: 4px 2px 12px;
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }

    .poster{
      flex: 0 0 132px;
      height: 188px;
      padding: 10px 8px;
      border-radius: 8px;
    }
    .poster h3{ font-size: 13px; }
    .poster p{ font-size: 9px; }
    .poster .code{ top: 8px; left: 8px; font-size: 9px; }
    .poster .now-playing{ top: 8px; right: 8px; font-size: 8px; padding: 2px 5px; }
    .poster .saga-tag{ top: 26px; left: 8px; font-size: 8px; }

    .episode-card{ flex: 0 0 208px; }
    .episode-title{ font-size: 13px; }
    .episode-desc{ font-size: 11px; -webkit-line-clamp: 2; }

    .tabs{
      margin: 20px 0 16px;
      gap: 8px;
      overflow-x: auto;
      justify-content: flex-start;
      -ms-overflow-style: none;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tabs::-webkit-scrollbar{ display:none; }
    .tab{
      flex: 0 0 auto;
      font-size: 10px;
      letter-spacing: 0.14em;
      padding: 9px 16px;
      white-space: nowrap;
    }

    .season-selector{ gap: 6px; margin: 2px 0 2px; }
    .season-pill{ font-size: 10px; padding: 6px 12px; }

    .status{ font-size: 11px; }
  }

  @media (max-width: 380px){
    .poster{ flex: 0 0 118px; height: 168px; }
    .episode-card{ flex: 0 0 188px; }
  }
</style>
</head>
<body>

<div class="resume-overlay" id="resumeOverlay">
  <div class="resume-modal">
    <div class="eyebrow">Retomando</div>
    <h2 id="resumeModalTitle">—</h2>
    <div class="resume-time">Quedaste en <span id="resumeModalTime">0:00</span></div>
    <div class="resume-actions">
      <button class="resume-btn primary" id="resumeContinueBtn">Continuar viendo</button>
      <button class="resume-btn" id="resumeRestartBtn">Empezar de nuevo</button>
    </div>
    <button class="resume-dismiss" id="resumeCloseBtn">Ahora no</button>
  </div>
</div>

<div class="theater">
  <div class="marquee">
    <div class="eyebrow">Ahora proyectando</div>
    <h1 id="titleDisplay">Elegí una película</h1>
  </div>

  <div class="screen-frame">
    <div class="sprocket-row">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>

    <video id="player" controls preload="metadata" playsinline webkit-playsinline>
      <source id="playerSource" src="" type="video/mp4">
    </video>

    <div class="sprocket-row bottom">
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
      <div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="movies">Películas</button>
    <button class="tab" data-tab="series">Series</button>
    <button class="tab" data-tab="sagas">Sagas</button>
  </div>

  <div id="moviesSection">
    <div class="carousel-label">Cartelera</div>
    <div class="carousel" id="carousel"></div>
  </div>

  <div id="seriesSection" style="display:none">
    <div class="carousel-label">Series</div>
    <div class="carousel" id="seriesCarousel"></div>

    <div class="season-selector" id="seasonSelector" style="display:none"></div>
    <div class="carousel" id="episodeCarousel" style="display:none"></div>
  </div>

  <div id="sagasSection" style="display:none">
    <div class="carousel-label">Sagas</div>
    <div class="carousel" id="sagaCarousel"></div>

    <div class="carousel-label" id="sagaMoviesLabel" style="display:none">Películas de la saga</div>
    <div class="carousel" id="sagaMoviesCarousel" style="display:none"></div>
  </div>

  <div class="status" id="status"></div>

  <div style="text-align:center; margin-top:24px; font-size:9px; letter-spacing:0.05em; color:#4a4a52;">
    Este producto usa la API de TMDB pero no está avalado ni certificado por TMDB.
  </div>
</div>

<script>
  // ------------------------------------------------------------------
  // Integración con TMDB (The Movie Database) — API gratuita.
  // Si una película/episodio NO tiene "poster" definido a mano, el sitio
  // busca automáticamente la portada/miniatura en TMDB usando el título
  // (y el año, si se especifica, para desambiguar remakes/homónimos).
  // ------------------------------------------------------------------
  const TMDB_API_KEY = '58dc4e2bb092932970cdd7af79434942';
  const TMDB_IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  const TMDB_LANG = 'es-419';

  function tmdbCacheGet(key){
    try {
      const raw = localStorage.getItem('tmdb_cache_' + key);
      return raw ? JSON.parse(raw) : undefined;
    } catch(e){ return undefined; }
  }
  function tmdbCacheSet(key, value){
    try { localStorage.setItem('tmdb_cache_' + key, JSON.stringify(value)); } catch(e){}
  }

  async function tmdbSearchMoviePoster(title, year){
    const cacheKey = 'movie_' + title + '_' + (year || '');
    const cached = tmdbCacheGet(cacheKey);
    if(cached !== undefined) return cached;
    try {
      let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=${TMDB_LANG}&query=${encodeURIComponent(title)}`;
      if(year) url += `&year=${year}`;
      const res = await fetch(url);
      const data = await res.json();
      const result = data.results && data.results[0];
      const posterUrl = result && result.poster_path ? TMDB_IMG_BASE + result.poster_path : null;
      tmdbCacheSet(cacheKey, posterUrl);
      return posterUrl;
    } catch(e){
      return null;
    }
  }

  async function tmdbFindTvId(title, year){
    const cacheKey = 'tvid_' + title + '_' + (year || '');
    const cached = tmdbCacheGet(cacheKey);
    if(cached !== undefined) return cached;
    try {
      let url = `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&language=${TMDB_LANG}&query=${encodeURIComponent(title)}`;
      if(year) url += `&first_air_date_year=${year}`;
      const res = await fetch(url);
      const data = await res.json();
      const result = data.results && data.results[0];
      const id = result ? result.id : null;
      tmdbCacheSet(cacheKey, id);
      return id;
    } catch(e){
      return null;
    }
  }

  async function tmdbGetSeasonEpisodes(tvId, seasonNumber){
    const cacheKey = 'season_' + tvId + '_' + seasonNumber;
    const cached = tmdbCacheGet(cacheKey);
    if(cached !== undefined) return cached;
    try {
      const url = `https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNumber}?api_key=${TMDB_API_KEY}&language=${TMDB_LANG}`;
      const res = await fetch(url);
      const data = await res.json();
      const episodes = (data.episodes || []).map(ep => ({
        title: ep.name,
        description: ep.overview,
        poster: ep.still_path ? TMDB_IMG_BASE + ep.still_path : null
      }));
      tmdbCacheSet(cacheKey, episodes);
      return episodes;
    } catch(e){
      return [];
    }
  }

  // ------------------------------------------------------------------
  // Para agregar una película nueva, sumá un objeto acá con:
  //   code    -> número o etiqueta corta que aparece arriba a la izquierda
  //   title   -> título mostrado en la tarjeta y en el encabezado
  //   gradient-> degradado de fondo de la tarjeta (2 colores hex)
  //   texture -> (opcional) 'slasher' aplica la textura de salpicaduras en CSS
  //   src     -> URL directa del archivo de video (release de GitHub, etc.)
  //   poster  -> (opcional) si se omite, se busca automáticamente en TMDB
  //              usando "title" (y "tmdbYear" si se especifica)
  //   tmdbYear-> (opcional) año de estreno, para desambiguar en TMDB
  // ------------------------------------------------------------------
  const MOVIES = [
    {
      code: '01',
      title: 'Toy Story 5',
      gradient: ['#0d1b3d', '#1e3a6d'],
      poster: 'https://m.media-amazon.com/images/M/MV5BOTNiNWExOTQtZTU1Ny00N2MyLWI4YzMtMWJjMTI1ZWRmNmQ4XkEyXkFqcGc@._V1_FMjpg_UX1080_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.0/TS5.mp4'
    },
    {
      code: '02',
      title: 'Scary Movie 6',
      gradient: ['#1a0507', '#5c1013'],
      texture: 'slasher',
      poster: 'https://m.media-amazon.com/images/M/MV5BNTJjMDk1NzAtMGVmNS00NTFmLWFlOTQtZDk5M2I2NjZiZDdlXkEyXkFqcGc@._V1_FMjpg_UX878_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.1/SC6.mp4'
    },
    {
      code: '03',
      title: 'Michael Jackson',
      gradient: ['#1a1408', '#5c4a13'],
      poster: 'https://m.media-amazon.com/images/M/MV5BNzllNmRlN2EtMDQyOC00ODJjLTg4OWQtZDNmNGU3YzlkNjc1XkEyXkFqcGc@._V1_FMjpg_UY3000_.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.2/MJU.mp4'
    },
    {
      code: '04',
      title: 'Obsession',
      gradient: ['#1a0d1f', '#4a1e52'],
      poster: 'https://m.media-amazon.com/images/M/MV5BMmQ3ODQxNjAtZmRlMS00NmNjLTliZmYtY2M3ZWQzMDIwMmNiXkEyXkFqcGc@.V1_FMjpg_UX1050.jpg',
      src: 'https://github.com/pruebagonzalez605-lgtm/movies/releases/download/1.3/Obson.mp4'
    },
    {
      code: '05',
      title: 'Los Simpson: Simpsley',

  // Crea una tarjeta de "poster" genérica reutilizable para películas, series y episodios
  function applyPosterImage(card, url, gradient){
    const setGradient = () => {
      card.style.backgroundImage = 'none';
      card.style.background = `linear-gradient(160deg, ${gradient[0]}, ${gradient[1]})`;
    };
    if(url){
      card.style.backgroundSize = 'cover';
      card.style.backgroundPosition = 'center';
      card.style.backgroundColor = gradient[1];
      const testImg = new Image();
      testImg.onload = () => {
        card.style.backgroundImage =
          `linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.9) 100%), url('${url}')`;
      };
      testImg.onerror = setGradient;
      testImg.src = url;
    } else {
      setGradient();
    }
  }

  function createPosterCard(item, opts = {}){
    const card = document.createElement('div');
    card.className = 'poster' + (item.texture ? ' texture-' + item.texture : '');
    const gradient = item.gradient || ['#1c1c22', '#141419'];
    if(item.poster){
      applyPosterImage(card, item.poster, gradient);
    } else if(!opts.noAutoFetch) {
      // Sin portada manual: la buscamos sola en TMDB
      applyPosterImage(card, null, gradient);
      tmdbSearchMoviePoster(item.title, item.tmdbYear).then(url => {
        if(url){
          item.poster = url; // cachea en el objeto para no re-buscar
          applyPosterImage(card, url, gradient);
        }
      });
    } else {
      applyPosterImage(card, null, gradient);
    }
    card.innerHTML = `
      <span class="code">${item.code || ''}</span>
      <span class="now-playing">Reproduciendo</span>
      ${item.saga ? `<span class="saga-tag">Saga: ${item.saga}</span>` : ''}
      <h3>${item.title}</h3>
    `;
    return card;
  }

  function selectMovie(movieIdx){
    const movie = MOVIES[movieIdx];
    if(!movie) return;
    playerSource.src = movie.src;
    playerSource.dataset.baseSrc = movie.src;
    player.load();
    titleDisplay.textContent = movie.title;
    status.textContent = 'Cargando: ' + movie.title;
    if(typeof startWatchdog === 'function') startWatchdog();

    if(movie.saga){
      const sameSaga = MOVIES.map((m, i) => i).filter(i => MOVIES[i].saga === movie.saga && i !== movieIdx);
      const rest = MOVIES.map((m, i) => i).filter(i => MOVIES[i].saga !== movie.saga && i !== movieIdx);
      movieOrder = [movieIdx, ...sameSaga, ...rest];
      renderCarousel();
    }

    const displayIdx = movieOrder.indexOf(movieIdx);
    [...carousel.children].forEach((el, i) => el.classList.toggle('active', i === displayIdx));
    player.play().catch(() => {});
  }

  async function ensureSeasonEpisodes(serie, season){
    if(season.episodes){
      // Modo manual: título/descripción los puso el usuario, pero si falta la miniatura
      // la buscamos igual en TMDB por posición (sin tocar título ni descripción).
      const missingPoster = season.episodes.some(ep => !ep.poster);
      if(missingPoster && !season._posterFetchAttempted){
        season._posterFetchAttempted = true;
        const tvId = await tmdbFindTvId(serie.tmdbShow || serie.title, serie.tmdbYear);
        if(tvId){
          const tmdbEpisodes = await tmdbGetSeasonEpisodes(tvId, season.season);
          season.episodes.forEach((ep, i) => {
            if(!ep.poster && tmdbEpisodes[i] && tmdbEpisodes[i].poster){
              ep.poster = tmdbEpisodes[i].poster;
            }
          });
        }
      }
      return season.episodes;
    }
    if(!season.srcs || !season.srcs.length){ season.episodes = []; return season.episodes; }
    const tvId = await tmdbFindTvId(serie.tmdbShow || serie.title, serie.tmdbYear);
    let tmdbEpisodes = [];
    if(tvId) tmdbEpisodes = await tmdbGetSeasonEpisodes(tvId, season.season);
    season.episodes = season.srcs.map((src, i) => {
      const tmdbEp = tmdbEpisodes[i] || {};
      return {
        title: tmdbEp.title || ('Episodio ' + (i + 1)),
        description: tmdbEp.description || '',
        poster: tmdbEp.poster || null,
        src
      };
    });
    return season.episodes;
  }

  function createEpisodeCard(ep, index){
    const card = document.createElement('div');
    card.className = 'episode-card';
    const thumb = document.createElement('div');
    thumb.className = 'episode-thumb';
    if(ep.poster) thumb.style.backgroundImage = `url('${ep.poster}')`;
    thumb.innerHTML = `
      <span class="ep-code">${index + 1}</span>
      <span class="ep-playing">Reproduciendo</span>
    `;
    const title = document.createElement('div');
    title.className = 'episode-title';
    title.textContent = `${index + 1}. ${ep.title}`;
    card.appendChild(thumb);
    card.appendChild(title);
    if(ep.description){
      const desc = document.createElement('div');
      desc.className = 'episode-desc';
      desc.textContent = ep.description;
      card.appendChild(desc);
    }
    return card;
  }

  async function renderEpisodeCarousel(){
    const serie = SERIES[currentSeriesIndex];
    if(!serie){ episodeCarousel.style.display = 'none'; return; }
    const season = serie.seasons[currentSeasonIndex];
    episodeCarousel.style.display = 'flex';

    if(!season.episodes && season.srcs && season.srcs.length){
      episodeCarousel.innerHTML = `<div style="color:var(--text-dim);font-size:12px;letter-spacing:0.1em;padding:20px 10px;">Buscando episodios en TMDB...</div>`;
    }

    const episodes = await ensureSeasonEpisodes(serie, season);

    // Si el usuario cambió de temporada/serie mientras esperábamos la respuesta, no pisamos la vista actual
    if(SERIES[currentSeriesIndex] !== serie || serie.seasons[currentSeasonIndex] !== season) return;

    episodeCarousel.innerHTML = '';
    if(!episodes.length){
      const soon = document.createElement('div');
      soon.style.color = 'var(--text-dim)';
      soon.style.fontSize = '12px';
      soon.style.letterSpacing = '0.1em';
      soon.style.padding = '20px 10px';
      soon.textContent = 'Próximamente...';
      episodeCarousel.appendChild(soon);
      return;
    }
    episodes.forEach((ep, i) => {
      const card = createEpisodeCard(ep, i);
      card.addEventListener('click', () => selectEpisode(i));
      episodeCarousel.appendChild(card);
    });
  }

  function selectEpisode(index){
    const serie = SERIES[currentSeriesIndex];
    const season = serie.seasons[currentSeasonIndex];
    const ep = season.episodes[index];
    if(!ep) return;
    playerSource.src = ep.src;
    playerSource.dataset.baseSrc = ep.src;
    player.load();
    titleDisplay.textContent = serie.title + ' — ' + ep.title;
    status.textContent = 'Cargando: ' + ep.title;
    if(typeof startWatchdog === 'function') startWatchdog();
    [...episodeCarousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    player.play().catch(() => {});
  }

  function getSagas(){
    const map = new Map();
    MOVIES.forEach((movie, i) => {
      if(!movie.saga) return;
      if(!map.has(movie.saga)) map.set(movie.saga, []);
      map.get(movie.saga).push(i);
    });
    return [...map.entries()].map(([name, indices]) => ({
      name,
      poster: MOVIES[indices[0]].poster,
      gradient: MOVIES[indices[0]].gradient,
      movieIndices: indices
    }));
  }

  function renderSagaCarousel(){
    const sagas = getSagas();
    sagaCarousel.innerHTML = '';
    sagas.forEach((saga, i) => {
      const card = createPosterCard({ title: saga.name, poster: saga.poster, gradient: saga.gradient });
      card.addEventListener('click', () => selectSaga(i));
      sagaCarousel.appendChild(card);
    });
  }

  function selectSaga(index){
    const sagas = getSagas();
    const saga = sagas[index];
    if(!saga) return;
    [...sagaCarousel.children].forEach((el, i) => el.classList.toggle('active', i === index));
    sagaMoviesLabel.style.display = 'block';
    sagaMoviesCarousel.style.display = 'flex';
    sagaMoviesCarousel.innerHTML = '';
    saga.movieIndices.forEach((movieIdx) => {
      const movie = MOVIES[movieIdx];
      const card = createPosterCard(movie);
      card.addEventListener('click', () => {
        switchTab('movies');
        selectMovie(movieIdx);
      });
      sagaMoviesCarousel.appendChild(card);
    });
  }

  function switchTab(tabName){
    [...tabs.children].forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
    moviesSection.style.display = tabName === 'movies' ? 'block' : 'none';
    seriesSection.style.display = tabName === 'series' ? 'block' : 'none';
    sagasSection.style.display = tabName === 'sagas' ? 'block' : 'none';
  }

  tabs.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if(!btn) return;
    switchTab(btn.dataset.tab);
  });

  player.addEventListener('error', () => {
    status.textContent = 'No se pudo cargar el video. Revisá que el release de GitHub siga disponible.';
  });
  player.addEventListener('playing', () => {
    status.textContent = '';
  });

  // ------------------------------------------------------------------
  // Watchdog anti-congelamiento
  // Los archivos se sirven directos desde un link (sin streaming adaptativo),
  // así que después de un rato la conexión al archivo se puede "colgar" y el
  // video se queda pegado en el mismo punto sin disparar un error real.
  // Este vigilante chequea cada 8s si el tiempo avanza mientras se supone
  // que está reproduciendo; si detecta 2 chequeos seguidos sin avance,
  // recarga el mismo video en el mismo punto exacto para reconectar solo.
  // ------------------------------------------------------------------
  let watchdogInterval = null;
  let watchdogLastTime = 0;
  let watchdogStallCount = 0;
  let isRecovering = false;

  function withCacheBust(url){
    if(!url) return url;
    const sep = url.includes('?') ? '&' : '?';
    return url + sep + '_r=' + Date.now();
  }

  function recoverPlayback(){
    if(isRecovering) return;
    isRecovering = true;
    const resumeAt = player.currentTime;
    const baseSrc = playerSource.dataset.baseSrc || playerSource.src;
    status.textContent = 'El video se trabó, reconectando...';
    playerSource.dataset.baseSrc = baseSrc;
    playerSource.src = withCacheBust(baseSrc);
    player.load();
    const onReady = () => {
      player.currentTime = resumeAt;
      player.play().catch(() => {});
      status.textContent = '';
      isRecovering = false;
      player.removeEventListener('loadedmetadata', onReady);
    };
    player.addEventListener('loadedmetadata', onReady);
  }

  function startWatchdog(){
    if(watchdogInterval) clearInterval(watchdogInterval);
    watchdogLastTime = player.currentTime;
    watchdogStallCount = 0;
    watchdogInterval = setInterval(() => {
      if(isRecovering || player.paused || player.ended){
        watchdogLastTime = player.currentTime;
        watchdogStallCount = 0;
        return;
      }
      if(Math.abs(player.currentTime - watchdogLastTime) < 0.15){
        watchdogStallCount++;
        if(watchdogStallCount >= 2){
          watchdogStallCount = 0;
          recoverPlayback();
        }
      } else {
        watchdogStallCount = 0;
      }
      watchdogLastTime = player.currentTime;
    }, 8000);
  }

  startWatchdog();

  // ------------------------------------------------------------------
  // Historial de reproducción (localStorage)
  // Guarda cada pocos segundos por dónde va cada video (identificado por
  // su link, que es único). Al recargar la página, si había algo
  // reproduciéndose, se ofrece continuar desde ese punto con un modal.
  // ------------------------------------------------------------------
  function saveProgress(src, time, duration){
    if(!src) return;
    try {
      const map = JSON.parse(localStorage.getItem('playback_progress') || '{}');
      map[src] = { time, duration, updatedAt: Date.now() };
      localStorage.setItem('playback_progress', JSON.stringify(map));
      localStorage.setItem('last_watched_src', src);
    } catch(e){}
  }
  function getProgress(src){
    try {
      const map = JSON.parse(localStorage.getItem('playback_progress') || '{}');
      return map[src] || null;
    } catch(e){ return null; }
  }
  function clearProgress(src){
    try {
      const map = JSON.parse(localStorage.getItem('playback_progress') || '{}');
      delete map[src];
      localStorage.setItem('playback_progress', JSON.stringify(map));
    } catch(e){}
  }

  function findContentLocation(src){
    const movieIdx = MOVIES.findIndex(m => m.src === src);
    if(movieIdx !== -1) return { kind: 'movie', movieIdx, title: MOVIES[movieIdx].title };
    for(let si = 0; si < SERIES.length; si++){
      const serie = SERIES[si];
      for(let sj = 0; sj < serie.seasons.length; sj++){
        const season = serie.seasons[sj];
        if(season.srcs){
          const epIdx = season.srcs.indexOf(src);
          if(epIdx !== -1) return { kind: 'episode', seriesIndex: si, seasonIndex: sj, episodeIndex: epIdx, title: serie.title + ' — T' + serie.seasons[sj].season + 'E' + (epIdx + 1) };
        }
        if(season.episodes){
          const epIdx = season.episodes.findIndex(e => e.src === src);
          if(epIdx !== -1) return { kind: 'episode', seriesIndex: si, seasonIndex: sj, episodeIndex: epIdx, title: serie.title + ' — ' + season.episodes[epIdx].title };
        }
      }
    }
    return null;
  }

  function formatTime(seconds){
    seconds = Math.max(0, Math.floor(seconds));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const pad = n => n.toString().padStart(2, '0');
    return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
  }

  async function goToLocation(location, seekTime){
    if(location.kind === 'movie'){
      switchTab('movies');
      selectMovie(location.movieIdx);
    } else {
      switchTab('series');
      currentSeriesIndex = location.seriesIndex;
      currentSeasonIndex = location.seasonIndex;
      [...seriesCarousel.children].forEach((el, i) => el.classList.toggle('active', i === location.seriesIndex));
      renderSeasonSelector();
      await renderEpisodeCarousel();
      selectEpisode(location.episodeIndex);
    }
    if(seekTime > 0){
      const onReady = () => {
        player.currentTime = seekTime;
        player.removeEventListener('loadedmetadata', onReady);
      };
      player.addEventListener('loadedmetadata', onReady);
    }
  }

  function showResumeModal(location, progress){
    document.getElementById('resumeModalTitle').textContent = location.title;
    document.getElementById('resumeModalTime').textContent = formatTime(progress.time);
    const overlay = document.getElementById('resumeOverlay');
    overlay.style.display = 'flex';

    document.getElementById('resumeContinueBtn').onclick = () => {
      overlay.style.display = 'none';
      goToLocation(location, progress.time);
    };
    document.getElementById('resumeRestartBtn').onclick = () => {
      overlay.style.display = 'none';
      clearProgress(location.src);
      goToLocation(location, 0);
    };
    document.getElementById('resumeCloseBtn').onclick = () => {
      overlay.style.display = 'none';
    };
  }

  // Guarda progreso periódicamente mientras se reproduce
  let lastProgressSave = 0;
  player.addEventListener('timeupdate', () => {
    const src = playerSource.dataset.baseSrc;
    if(!src || !player.duration) return;
    const now = Date.now();
    if(now - lastProgressSave < 5000) return;
    lastProgressSave = now;
    // No guardamos si está muy al principio o muy cerca del final (ya lo vio)
    if(player.currentTime > 10 && (player.duration - player.currentTime) > 15){
      saveProgress(src, player.currentTime, player.duration);
    }
  });
  player.addEventListener('ended', () => {
    const src = playerSource.dataset.baseSrc;
    if(src) clearProgress(src);
  });

  renderCarousel();
  renderSeriesCarousel();
  renderSagaCarousel();
  selectMovie(0);

  // Al cargar la página, si había algo reproduciéndose, ofrecemos continuar
  (function checkResume(){
    try {
      const lastSrc = localStorage.getItem('last_watched_src');
      if(!lastSrc) return;
      const progress = getProgress(lastSrc);
      if(!progress || progress.time <= 15) return;
      const location = findContentLocation(lastSrc);
      if(!location) return;
      location.src = lastSrc;
      showResumeModal(location, progress);
    } catch(e){}
  })();
</script>

</body>
